<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-assets>
      <a-asset-item id="foxModel" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb"></a-asset-item>
    </a-assets>

    <!-- MARCADOR 1: La Portada (Marcador Hiro) -->
    <!-- Al enfocar este, veremos al Zorro 3D -->
    <a-marker preset="hiro">
      <a-gltf-model position="0 0 0" scale="0.05 0.05 0.05" src="#foxModel" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-gltf-model>
    </a-marker>

    <!-- MARCADOR 2: Capítulo Interior (Marcador Kanji) -->
    <!-- Al enfocar este, veremos un Cubo Azul que podría ser otro personaje -->
    <a-marker preset="kanji">
      <a-box position="0 0.5 0" color="#0044ff" material="opacity: 0.8" animation="property: rotation; to: 0 360 0; loop: true; dur: 2000"></a-box>
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
