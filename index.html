<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>Proiectio | Realidad Aumentada (Beta)</title>
  
  <!-- Tipografías Premium de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- A-Frame Extras para animaciones (como Rigel triste) -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  <!-- AR.js con soporte para Marcadores de Código de Barras (Matrix) -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    :root {
      --neon-green: #00ff00;
      --neon-blue: #00c3ff;
      --neon-magenta: #ff007f;
      --glass-bg: rgba(5, 10, 5, 0.75);
      --glass-border: rgba(0, 255, 0, 0.25);
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background-color: #000;
    }

    /* Interfaz HUD (Heads-Up Display) Estilo Sci-Fi */
    .hud-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none; /* Permite que los clics pasen al lienzo de A-Frame */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }

    /* Elementos interactivos dentro del HUD necesitan reactivar puntero */
    .interactive {
      pointer-events: auto;
    }

    /* Tarjeta Superior HUD */
    .hud-header {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 15px 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0, 255, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .hud-title-area {
      display: flex;
      flex-direction: column;
    }

    .hud-title {
      font-family: 'Orbitron', sans-serif;
      color: var(--neon-green);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      margin: 0;
      text-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
    }

    .hud-subtitle {
      font-size: 10px;
      color: #888;
      margin: 4px 0 0 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: #fff;
      background: rgba(0, 255, 0, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(0, 255, 0, 0.3);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: var(--neon-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--neon-green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* Retícula de Escaneo Central */
    .scanner-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px;
      height: 250px;
      border: 2px dashed rgba(0, 255, 0, 0.3);
      border-radius: 24px;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scanner-overlay::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--neon-green), transparent);
      box-shadow: 0 0 8px var(--neon-green);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Esquinas Sci-fi del escáner */
    .scanner-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid var(--neon-green);
    }
    .top-left { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 12px; }
    .top-right { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 12px; }
    .bottom-left { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 12px; }
    .bottom-right { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 12px; }

    /* Tarjeta Inferior de Instrucciones */
    .hud-footer {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 15px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .instructions-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--neon-blue);
      letter-spacing: 1px;
      margin: 0;
      text-transform: uppercase;
    }

    .instructions-text {
      font-size: 12px;
      color: #ddd;
      margin: 0;
      line-height: 1.4;
    }

    .interactive-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: bold;
      color: #000;
      background: var(--neon-blue);
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* Botón Volver a DEVA */
    .btn-back {
      color: var(--neon-green);
      background: transparent;
      border: 1px solid var(--neon-green);
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      text-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
    }

    .btn-back:hover {
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 10px var(--neon-green);
    }

    /* Ocultar elementos AR.js por defecto */
    .a-enter-vr { display: none !important; }

    @media (max-width: 600px) {
      .hud-header { padding: 10px 15px; }
      .hud-title { font-size: 12px; }
      .scanner-overlay { width: 180px; height: 180px; }
      .instructions-text { font-size: 11px; }
    }
  </style>

  <script>
    // --- COMPONENTE CUSTOM DE A-FRAME PARA ROTACIÓN TÁCTIL (DRAG ROTATE) ---
    AFRAME.registerComponent('drag-rotate', {
      schema: {
        speed: { type: 'number', default: 1.0 }
      },
      init: function() {
        this.ifMouseDown = false;
        this.x_coords = 0;
        this.y_coords = 0;
        
        // Bindeamos los event handlers
        this.OnDocumentMouseDown = this.OnDocumentMouseDown.bind(this);
        this.OnDocumentMouseMove = this.OnDocumentMouseMove.bind(this);
        this.OnDocumentMouseUp = this.OnDocumentMouseUp.bind(this);
        this.OnDocumentTouchStart = this.OnDocumentTouchStart.bind(this);
        this.OnDocumentTouchMove = this.OnDocumentTouchMove.bind(this);
        this.OnDocumentTouchEnd = this.OnDocumentTouchEnd.bind(this);

        // Listeners globales en window
        window.addEventListener('mousedown', this.OnDocumentMouseDown);
        window.addEventListener('mousemove', this.OnDocumentMouseMove);
        window.addEventListener('mouseup', this.OnDocumentMouseUp);
        
        window.addEventListener('touchstart', this.OnDocumentTouchStart);
        window.addEventListener('touchmove', this.OnDocumentTouchMove);
        window.addEventListener('touchend', this.OnDocumentTouchEnd);
      },
      OnDocumentMouseDown: function(event) {
        this.ifMouseDown = true;
        this.x_coords = event.clientX;
        this.y_coords = event.clientY;
      },
      OnDocumentMouseMove: function(event) {
        if (this.ifMouseDown && this.el.object3D) {
          const temp_x = event.clientX - this.x_coords;
          const temp_y = event.clientY - this.y_coords;
          
          this.el.object3D.rotation.y += temp_x * this.data.speed * 0.01;
          this.el.object3D.rotation.x += temp_y * this.data.speed * 0.01;
          
          this.x_coords = event.clientX;
          this.y_coords = event.clientY;
        }
      },
      OnDocumentMouseUp: function() {
        this.ifMouseDown = false;
      },
      OnDocumentTouchStart: function(event) {
        if (event.touches.length === 1) {
          this.ifMouseDown = true;
          this.x_coords = event.touches[0].clientX;
          this.y_coords = event.touches[0].clientY;
        }
      },
      OnDocumentTouchMove: function(event) {
        if (this.ifMouseDown && event.touches.length === 1 && this.el.object3D) {
          const temp_x = event.touches[0].clientX - this.x_coords;
          const temp_y = event.touches[0].clientY - this.y_coords;
          
          this.el.object3D.rotation.y += temp_x * this.data.speed * 0.01;
          this.el.object3D.rotation.x += temp_y * this.data.speed * 0.01;
          
          this.x_coords = event.touches[0].clientX;
          this.y_coords = event.touches[0].clientY;
        }
      },
      OnDocumentTouchEnd: function() {
        this.ifMouseDown = false;
      },
      remove: function() {
        window.removeEventListener('mousedown', this.OnDocumentMouseDown);
        window.removeEventListener('mousemove', this.OnDocumentMouseMove);
        window.removeEventListener('mouseup', this.OnDocumentMouseUp);
        window.removeEventListener('touchstart', this.OnDocumentTouchStart);
        window.removeEventListener('touchmove', this.OnDocumentTouchMove);
        window.removeEventListener('touchend', this.OnDocumentTouchEnd);
      }
    });

    // --- COMPONENTE CUSTOM DE A-FRAME PARA TERMINAL DINÁMICA (DYNAMIC TERMINAL) ---
    AFRAME.registerComponent('dynamic-terminal', {
      init: function () {
        const canvas = document.getElementById('terminal-canvas');
        const ctx = canvas.getContext('2d');
        this.canvas = canvas;
        this.ctx = ctx;
        this.t = 0;
        this.draw();
      },
      tick: function (time, timeDelta) {
        this.t += timeDelta;
        this.draw();
        
        // Indicamos a A-Frame que la textura del canvas se ha actualizado
        const mesh = this.el.getObject3D('mesh');
        if (mesh && mesh.material && mesh.material.map) {
          mesh.material.map.needsUpdate = true;
        }
      },
      draw: function () {
        const ctx = this.ctx;
        const w = this.canvas.width;
        const h = this.canvas.height;
        
        // Fondo oscuro semitransparente (efecto cristal holográfico)
        ctx.fillStyle = 'rgba(5, 10, 8, 0.95)';
        ctx.fillRect(0, 0, w, h);
        
        // Borde tecnológico neón
        ctx.strokeStyle = 'rgba(0, 255, 128, 0.5)';
        ctx.lineWidth = 6;
        ctx.strokeRect(10, 10, w - 20, h - 20);
        
        // Esquinas neón magenta
        ctx.strokeStyle = '#ff007f';
        ctx.lineWidth = 10;
        // Top-left
        ctx.beginPath(); ctx.moveTo(35, 10); ctx.lineTo(10, 10); ctx.lineTo(10, 35); ctx.stroke();
        // Top-right
        ctx.beginPath(); ctx.moveTo(w - 35, 10); ctx.lineTo(w - 10, 10); ctx.lineTo(w - 10, 35); ctx.stroke();
        // Bottom-left
        ctx.beginPath(); ctx.moveTo(35, h - 10); ctx.lineTo(10, h - 10); ctx.lineTo(10, h - 35); ctx.stroke();
        // Bottom-right
        ctx.beginPath(); ctx.moveTo(w - 35, h - 10); ctx.lineTo(w - 10, h - 10); ctx.lineTo(w - 10, h - 35); ctx.stroke();
        
        // Efecto de líneas de escaneo (Scanlines)
        ctx.fillStyle = 'rgba(0, 255, 128, 0.04)';
        for (let i = 15; i < h - 15; i += 6) {
          const offset = Math.sin(this.t * 0.0015 + i * 0.08) * 1.5;
          ctx.fillRect(15, i + offset, w - 30, 2);
        }
        
        // Interferencia aleatoria (Glitch)
        if (Math.random() < 0.04) {
          ctx.fillStyle = 'rgba(255, 0, 127, 0.25)';
          ctx.fillRect(15, Math.random() * (h - 40) + 20, w - 30, Math.random() * 25);
        }
        
        // Resplandor de texto neón
        ctx.shadowColor = '#ff007f';
        ctx.shadowBlur = 12;
        
        // Título de la alerta (Rosa neón)
        ctx.fillStyle = '#ff007f';
        ctx.font = 'bold 22px "Orbitron", monospace';
        ctx.textAlign = 'center';
        ctx.fillText('CRITICAL LOGIC ERROR: 404', w / 2, 75);
        
        // Subtítulo del sistema (Cian neón)
        ctx.shadowColor = '#00c3ff';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#00c3ff';
        ctx.font = '14px "Orbitron", monospace';
        ctx.fillText('SICA SECURITY DETECTED // BYPASSING...', w / 2, 115);
        
        // Línea divisoria técnica
        ctx.strokeStyle = 'rgba(0, 195, 255, 0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(40, 135); ctx.lineTo(w - 40, 135); ctx.stroke();
        
        // Texto del Lore en el centro (Pregunta y Mensaje)
        ctx.shadowColor = '#ff007f';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ff007f';
        ctx.font = 'bold 20px "Courier New", Courier, monospace';
        
        const line1 = '¿Por qué borrar a los';
        const line2 = 'que limpian?';
        ctx.fillText(line1, w / 2, 195);
        ctx.fillText(line2, w / 2, 235);
        
        ctx.shadowColor = '#00ff00';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#00ff00';
        const line3 = 'Eso no optimiza el sistema.';
        ctx.fillText(line3, w / 2, 305);
        
        // Carita triste palpitante neón
        const pulse = Math.sin(this.t * 0.007) > 0;
        if (pulse) {
          ctx.shadowColor = '#ff007f';
          ctx.shadowBlur = 18;
          ctx.fillStyle = '#ff007f';
        } else {
          ctx.shadowColor = '#7f003f';
          ctx.shadowBlur = 4;
          ctx.fillStyle = '#7f003f';
        }
        ctx.font = 'bold 26px "Courier New", Courier, monospace';
        const line4 = 'Eso duele. :(';
        ctx.fillText(line4, w / 2, 365);
        
        // Reset de resplandor para textos de pie de pantalla
        ctx.shadowBlur = 0;
        
        // Estado del procesador
        ctx.fillStyle = 'rgba(0, 255, 128, 0.65)';
        ctx.font = '11px "Orbitron", monospace';
        ctx.fillText('NÚCLEO BETA-7 // COGNITIVE_STATE: UNSTABLE', w / 2, 440);
        
        // Cursor parpadeante
        if (Math.floor(this.t / 250) % 2 === 0) {
          ctx.fillStyle = 'rgba(0, 255, 128, 0.7)';
          ctx.fillRect(w / 2 + 105, 348, 12, 18);
        }
      }
    });

    // --- COMPONENTE CUSTOM DE A-FRAME PARA PÍXELES ERRÁTICOS (ERRATIC GLITCH PIXELS) ---
    AFRAME.registerComponent('erratic-pixels', {
      schema: {
        count: { type: 'int', default: 70 },
        range: { type: 'number', default: 1.3 },
        speed: { type: 'number', default: 1.2 },
        colors: { type: 'array', default: ['#ff007f', '#00c3ff', '#00ff00', '#ffffff', '#ff003c'] }
      },
      init: function () {
        this.pixels = [];
        this.group = new THREE.Group();
        this.el.object3D.add(this.group);

        const colors = this.data.colors.map(c => new THREE.Color(c));
        
        // Geometrías para tres tipos de píxeles:
        const geomCube = new THREE.BoxGeometry(0.03, 0.03, 0.03);
        const geomWide = new THREE.BoxGeometry(0.12, 0.015, 0.015);
        const geomTall = new THREE.BoxGeometry(0.015, 0.12, 0.015);
        const geometries = [geomCube, geomWide, geomTall];

        for (let i = 0; i < this.data.count; i++) {
          const material = new THREE.MeshBasicMaterial({
            color: colors[Math.floor(Math.random() * colors.length)],
            transparent: true,
            opacity: Math.random() * 0.7 + 0.3,
            side: THREE.DoubleSide
          });
          
          const geom = geometries[Math.floor(Math.random() * geometries.length)];
          const mesh = new THREE.Mesh(geom, material);
          
          this.resetPixel(mesh);
          this.group.add(mesh);
          
          this.pixels.push({
            mesh: mesh,
            speedX: (Math.random() - 0.5) * 0.15 * this.data.speed,
            speedY: (Math.random() - 0.5) * 0.15 * this.data.speed,
            speedZ: (Math.random() - 0.5) * 0.15 * this.data.speed,
            glitchTimer: Math.random() * 600 + 100,
            rotSpeed: (Math.random() - 0.5) * 2.0
          });
        }

        // Configuración para la red de líneas vectoriales (glitch wires)
        this.lineGeometry = new THREE.BufferGeometry();
        this.lineMaterial = new THREE.LineBasicMaterial({
          color: 0x00ffcc,
          transparent: true,
          opacity: 0.25
        });
        this.lineMesh = new THREE.LineSegments(this.lineGeometry, this.lineMaterial);
        this.group.add(this.lineMesh);
      },
      resetPixel: function (mesh) {
        const r = this.data.range;
        mesh.position.set(
          (Math.random() - 0.5) * r,
          (Math.random() - 0.5) * r + 0.4, // Centrado ligeramente arriba del marcador
          (Math.random() - 0.5) * r
        );
        const size = Math.random() * 1.5 + 0.5;
        mesh.scale.set(size, size, size);
      },
      tick: function (time, timeDelta) {
        const r = this.data.range;
        const dt = timeDelta / 1000;
        const speed = this.data.speed;

        this.pixels.forEach(p => {
          // Movimiento
          p.mesh.position.x += p.speedX * dt;
          p.mesh.position.y += p.speedY * dt;
          p.mesh.position.z += p.speedZ * dt;

          // Reseteo por frontera
          if (p.mesh.position.length() > r * 1.6) {
            this.resetPixel(p.mesh);
          }

          // Rotación individual
          p.mesh.rotation.y += p.rotSpeed * dt;

          // Lógica de Glitch
          p.glitchTimer -= timeDelta;
          if (p.glitchTimer <= 0) {
            if (Math.random() < 0.6) {
              p.mesh.position.x += (Math.random() - 0.5) * 0.15;
              p.mesh.position.y += (Math.random() - 0.5) * 0.15;
              p.mesh.position.z += (Math.random() - 0.5) * 0.15;
            }
            if (Math.random() < 0.5) {
              const burst = Math.random() * 2.2 + 0.2;
              p.mesh.scale.set(burst, burst, burst);
            }
            p.mesh.material.opacity = Math.random() < 0.15 ? 0 : (Math.random() * 0.7 + 0.3);
            p.glitchTimer = Math.random() * 700 + 80;
          }
        });

        // Rotación lenta de todo el grupo
        this.group.rotation.y += 0.004 * speed;
        this.group.rotation.x += 0.002 * speed;

        // --- Dibujado de líneas de interconexión ---
        const positions = [];
        const threshold = 0.35;
        const maxConnections = 35;
        let connections = 0;

        for (let i = 0; i < this.pixels.length; i++) {
          if (connections >= maxConnections) break;
          const pos1 = this.pixels[i].mesh.position;
          
          for (let j = i + 1; j < this.pixels.length; j++) {
            if (connections >= maxConnections) break;
            const pos2 = this.pixels[j].mesh.position;
            
            const dx = pos1.x - pos2.x;
            const dy = pos1.y - pos2.y;
            const dz = pos1.z - pos2.z;
            const distSq = dx*dx + dy*dy + dz*dz;

            if (distSq < threshold * threshold) {
              positions.push(pos1.x, pos1.y, pos1.z);
              positions.push(pos2.x, pos2.y, pos2.z);
              connections++;
            }
          }
        }

        this.lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        this.lineGeometry.attributes.position.needsUpdate = true;
      }
    });
  </script>
</head>
<body style="margin: 0; overflow: hidden;">
  
  <!-- INTERFAZ HUD SUPERPUESTA -->
  <div class="hud-container">
    <!-- Header -->
    <div class="hud-header interactive">
      <div class="hud-title-area">
        <h1 class="hud-title">PROIECTIO | VISIÓN AR</h1>
        <p class="hud-subtitle">Módulo Ojos del Alma — Lector Activo</p>
      </div>
      <div class="hud-status">
        <span class="status-dot"></span>
        <span>BIFROST ACTIVO</span>
      </div>
      <a href="../DevaTerminal/index.html" class="btn-back">< VOLVER A DEVA</a>
    </div>

    <!-- Retícula de escaneo (Guía visual) -->
    <div class="scanner-overlay">
      <div class="scanner-corner top-left"></div>
      <div class="scanner-corner top-right"></div>
      <div class="scanner-corner bottom-left"></div>
      <div class="scanner-corner bottom-right"></div>
    </div>

    <!-- Footer de Instrucciones Generales -->
    <div class="hud-footer">
      <h2 class="instructions-title">Instrucciones de Intrusión</h2>
      <p class="instructions-text">
        <span class="interactive-badge">ESCANEADO</span> Enfoca el marcador AR impreso en el libro. 
        Arrastra tu dedo o el mouse en pantalla para girar el objeto 3D y descubrir sus detalles ocultos.
      </p>
    </div>
  </div>

  <!-- ESCENA AR.JS CONFIGURADA PARA DETECTAR CÓDIGOS DE BARRAS -->
  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false">
    
    <!-- ====================================================================================== -->
    <!-- ILUMINACIÓN DE ALTO RENDIMIENTO (Específica para resaltar metalizados PBR oro/plata) -->
    <!-- ====================================================================================== -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 2.5"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 3.0" position="-2 4 2"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 2.5" position="2 4 -2"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 1.8" position="0 -3 0"></a-entity> <!-- Luz desde abajo -->

    <!-- DEFINICIÓN DE ASSETS DINÁMICOS -->
    <a-assets>
      <canvas id="terminal-canvas" width="512" height="512"></canvas>
    </a-assets>

    <!-- ========================================================== -->
    <!-- CAPÍTULO 1 (Marcador de Código de Barras: 1)                -->
    <!-- Barra Solaris Citrus 3D Acostada y Escalada Óptimamente    -->
    <!-- ========================================================== -->
    <a-marker type="barcode" value="1">
      <!-- 
        Cargamos el modelo 3D de la barra Solaris.
        - position: pegada a la superficie del marcador (0 0.05 0)
        - scale: reducida a 1.3 para que no se desborde y quepa en la pantalla
        - rotation: acostada horizontalmente (90 0 0) para que el reflejo de luz sea perfecto y se lea "SOLARIS"
        - drag-rotate: activa el componente custom para girar
      -->
      <a-gltf-model 
        src="modelos/solaris_citrus.glb" 
        position="0 0.05 0" 
        scale="1.3 1.3 1.3"
        rotation="90 0 0"
        drag-rotate>
      </a-gltf-model>
    </a-marker>

    <!-- ========================================================== -->
    <!-- CAPÍTULO 2 (Marcador de Código de Barras: 2)                -->
    <!-- Modelo Deltar GLB y Leyenda DELTAR (Dispositivo Físico)    -->
    <!-- ========================================================== -->
    <a-marker type="barcode" value="2">
      <!-- Módulo del Modelo 3D de Deltar -->
      <a-gltf-model 
        src="modelos/deltar.glb" 
        position="0 0.05 0" 
        scale="1.0 1.0 1.0"
        rotation="0 0 0"
        drag-rotate>
      </a-gltf-model>

      <!-- Leyenda DELTAR en letras verdes sencillas flotantes -->
      <a-text 
        value="DELTAR" 
        position="0 1.2 0" 
        align="center" 
        color="#00ff00" 
        width="5" 
        side="double">
      </a-text>
    </a-marker>

    <!-- ========================================================== -->
    <!-- CAPÍTULO 2 - EXTRA (Marcador de Código de Barras: 7)       -->
    <!-- Jugador Caótico (Punto Negro y Píxeles Erráticos)          -->
    <!-- ========================================================== -->
    <a-marker type="barcode" value="7">
      <!-- Modelo 3D del Jugador Caótico -->
      <a-gltf-model 
        src="modelos/jugador_caotico_low.glb" 
        position="0 0.3 0" 
        scale="0.3 0.3 0.3"
        rotation="0 0 0"
        animation-mixer
        drag-rotate>
      </a-gltf-model>

      <!-- Enjambre de píxeles erráticos de la anomalía -->
      <a-entity erratic-pixels="count: 90; range: 1.5; speed: 1.5"></a-entity>

      <!-- Texto descriptivo flotante -->
      <a-text 
        value="CODULO CAOTICO" 
        position="0 1.3 0" 
        align="center" 
        color="#ff007f" 
        width="4.5" 
        side="double">
      </a-text>
    </a-marker>

    <!-- ========================================================== -->
    <!-- CAPÍTULO 3 (Marcador de Código de Barras: 3)                -->
    <!-- Pantalla Holográfica: ¿Por qué borrar a los que limpian?   -->
    <!-- ========================================================== -->
    <a-marker type="barcode" value="3">
      <!-- 
        Proyectamos la terminal como una pantalla vertical flotante.
        - position: 0 0.9 0 (para elevar el centro y que no choque con la mesa)
        - rotation: 0 0 0 (se levanta verticalmente de forma perpendicular al marcador)
      -->
      <a-plane 
        position="0 0.9 0" 
        rotation="0 0 0" 
        width="1.6" 
        height="1.6" 
        material="src: #terminal-canvas; transparent: true; opacity: 0.95; shader: flat; side: double;"
        dynamic-terminal
        drag-rotate>
      </a-plane>
    </a-marker>

    <!-- ========================================================== -->
    <!-- CAPÍTULO 4 (Marcador de Código de Barras: 4)                -->
    <!-- Modelo 3D: El Refugio de los Niños (Open Arms / Rigel)     -->
    <!-- ========================================================== -->
    <a-marker type="barcode" value="4">
      <a-gltf-model 
        src="modelos/open_arms.glb" 
        position="0 0.05 0" 
        scale="1.0 1.0 1.0"
        rotation="0 0 0"
        animation-mixer
        drag-rotate>
      </a-gltf-model>

      <!-- Enjambre de píxeles erráticos y conectores vectoriales alrededor de Rigel -->
      <a-entity erratic-pixels="count: 75; range: 1.4; speed: 1.3"></a-entity>
    </a-marker>

    <!-- ========================================================== -->
    <!-- CAPÍTULO 5 (Marcador de Código de Barras: 5)                -->
    <!-- Placeholder: Toroide Holográfico Gigante                   -->
    <!-- ========================================================== -->
    <a-marker type="barcode" value="5">
      <a-torus 
        position="0 0.4 0" 
        radius="0.5" 
        radius-tubular="0.1" 
        color="#800080" 
        material="opacity: 0.6; wireframe: true; transparent: true"
        drag-rotate>
      </a-torus>
    </a-marker>

    <!-- ========================================================== -->
    <!-- CAPÍTULO 6 (Marcador de Código de Barras: 6)                -->
    <!-- Placeholder: Dodecaedro Holográfico Gigante               -->
    <!-- ========================================================== -->
    <a-marker type="barcode" value="6">
      <a-dodecahedron 
        position="0 0.4 0" 
        radius="0.6" 
        color="#00FFFF" 
        material="opacity: 0.6; wireframe: true; transparent: true"
        drag-rotate>
      </a-dodecahedron>
    </a-marker>

    <!-- ========================================================== -->
    <!-- CÁMARA CON LINTERNA DIRECTA ACOPLADA (Headlight Effect)     -->
    <!-- Mueve la luz con el punto de vista del usuario para        -->
    <!-- eliminar sombras en texturas metálicas PBR                 -->
    <!-- ========================================================== -->
    <a-entity camera>
      <a-entity light="type: directional; color: #ffffff; intensity: 2.0" position="0 0 1"></a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
